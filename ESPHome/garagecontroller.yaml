esphome:
  name: garagecontroller

esp8266:
  board: huzzah

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret apikey

ota:
  - platform: esphome


wifi:
  ssid: "CGJ-IoT"
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "GarageController"
    password: ""

captive_portal:
    

i2c:
  sda: 4
  scl: 5
  scan: true

pcf8574:
  - id: 'iox'
    address: 0x21
    pcf8575: false

# Set the component with default (address: 0x60 / global I²C)
mcp4728:
  - id: 'vout'

output:
- platform: mcp4728
  id: 'vout0'
  channel: A
  vref: internal
- platform: mcp4728
  id: 'vout1'
  channel: B
  vref: internal
- platform: mcp4728
  id: 'vout2'
  channel: C
  vref: internal
- platform: mcp4728
  id: 'vout3'
  channel: D
  vref: internal

- platform: gpio
  id: "K1"
  pin:
    pcf8574: 'iox'
    number: 0
    mode:
      output: true
    inverted: false
- platform: gpio
  id: "K2"
  pin:
    pcf8574: 'iox'
    number: 1
    mode:
      output: true
    inverted: false
- platform: gpio
  id: "K3"
  pin:
    pcf8574: 'iox'
    number: 2
    mode:
      output: true
    inverted: false
- platform: gpio
  id: "K4"
  pin:
    pcf8574: 'iox'
    number: 3
    mode:
      output: true
    inverted: false

binary_sensor:
  - platform: gpio
    id: 'din0'
    name: "Garage Door"
    device_class: garage_door
    pin:
      pcf8574: 'iox'
      number: 4
      mode:
        input: true
      inverted: false
  - platform: gpio
    id: 'din1'
    pin:
      pcf8574: 'iox'
      number: 5
      mode:
        input: true
      inverted: false
  - platform: gpio
    id: 'din2'
    pin:
      pcf8574: 'iox'
      number: 6
      mode:
        input: true
      inverted: false
  - platform: gpio
    id: 'din3'
    pin:
      pcf8574: 'iox'
      number: 7
      mode:
        input: true
      inverted: false

light:
  - platform: monochromatic
    name: "Light1"
    output: 'vout0'
    restore_mode: ALWAYS_ON
    on_turn_off:
      - output.turn_off: 'K1'
    on_turn_on:
      - output.turn_on: 'K1'
  - platform: monochromatic
    name: "Light2"
    output: 'vout1'
    restore_mode: ALWAYS_ON
    on_turn_off:
      - output.turn_off: 'K2'
    on_turn_on:
      - output.turn_on: 'K2'
  - platform: monochromatic
    name: "Light3"
    output: 'vout2'
    restore_mode: ALWAYS_ON
    on_turn_off:
      - output.turn_off: 'K3'
    on_turn_on:
      - output.turn_on: 'K3'
